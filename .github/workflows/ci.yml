name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Test (PR)
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t lint,test,build --base=origin/${{ github.base_ref }} --head=HEAD

      - name: Lint & Test (Push to main)
        if: github.event_name == 'push'
        run: pnpm nx affected -t lint,test,build
