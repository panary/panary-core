name: Build Edge Docker

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-latest
    # Historisch lief der Edge-Build am 30-min-Cap (cache-los + QEMU-arm64,
    # ~50% cancelled). Seit 2026-06-18: nur noch linux/amd64 + GHA-Layer-Cache
    # → deutlich darunter. 45 bleibt grosszuegiger Headroom (Cap, kein Ziel);
    # nach Beobachtung realer amd64-Zeiten ggf. senken.
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write
      # OIDC-Token fuer keyless cosign (Fulcio/Rekor) + Build-Provenance-Attestation.
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Hinweis: Der QEMU-Setup-Step (docker/setup-qemu-action) wurde am
      # 2026-06-18 entfernt — er wird nur fuer die arm64-Emulation gebraucht,
      # und der Edge baut jetzt nur linux/amd64. Re-Aktivierung: siehe Kommentar
      # am `platforms:`-Feld im Build-Step + documentation/edge-build-platforms.md.

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version Tag
        id: version
        run: |
          # github-Kontext NICHT direkt interpolieren (Shell-Injection-Risiko,
          # semgrep run-shell-injection) — die Runner-ENV $GITHUB_REF nutzen.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag-Push: Version direkt aus dem Tag lesen (v26.4.1 → 26.4.1)
            echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch: Version aus package.json lesen
            echo "tag=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Copy .dockerignore
        run: cp tools/docker/.dockerignore .dockerignore

      # Workspace-Files fuer den Docker-Build-Kontext bereitstellen.
      # Lokal lebt pnpm-workspace.yaml NUR im Workbench-Root (`_WORKBENCH_PANARY/`),
      # und pnpm-lock.yaml ist ein Symlink dorthin (`pnpm-lock.yaml -> ../pnpm-lock.yaml`).
      # Im CI fehlt das Workbench-Root → die Datei muss inline geschrieben werden,
      # und der Symlink muss durch eine echte Lockfile ersetzt werden, sonst
      # bricht `Dockerfile.edge:23` (COPY pnpm-workspace.yaml/pnpm-lock.yaml)
      # mit "not found" bzw. broken-link. Beobachtet bei v26.6.1.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js (fuer pnpm install --lockfile-only)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Workspace-Files fuer Docker-Kontext materialisieren
        run: |
          # Symlink-Lockfile durch echte Datei ersetzen
          if [ -L pnpm-lock.yaml ]; then rm pnpm-lock.yaml; fi
          cat > pnpm-workspace.yaml <<'EOF'
          packages:
            - 'apps/*'
            - 'libs/domains/*'
            # libs/shared selbst ist das @panary/shared-Parent-Paket (Option A);
            # ohne diesen Eintrag ist es kein Workspace-Member und pnpm versucht,
            # den @panary/shared-Peer der Domain-Parents von registry.npmjs.org
            # zu fetchen → ERR_PNPM_FETCH_404 (so geschehen bei v26.7.5).
            - 'libs/shared'
            - 'libs/shared/*'
          onlyBuiltDependencies:
            - '@swc/core'
            - 'better-sqlite3'
            - 'esbuild'
            - 'nx'
          EOF
          # .npmrc fuer Workspace-Linking — sonst zieht pnpm @panary/*
          # aus npm.pkg.github.com (ERR_PNPM_FETCH_401 ohne Auth-Token).
          cat > .npmrc <<'EOF'
          link-workspace-packages=deep
          prefer-workspace-packages=true
          auto-install-peers=true
          strict-peer-dependencies=false
          EOF
          # Echte Lockfile generieren (Inhalt landet via COPY im Image und wird
          # darin von `pnpm install` konsumiert).
          pnpm install --lockfile-only

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: tools/docker/Dockerfile.edge
          # 2026-06-18: arm64 entfernt — der Edge laeuft beim Testkunden auf einem
          # amd64-Linux-Server; das api-edge-Image wird nirgends auf ARM deployt
          # (die Sunmi-Geraete fahren den pos-client/Frontend, nicht dieses Image).
          # Das QEMU-emulierte arm64-Cross-Build war der groesste Zeitfresser.
          #
          # >>> Re-Aktivierung von arm64 (z.B. ARM-SBC als Edge) — exakt: <<<
          #   1. Diese Zeile zuruecksetzen auf:
          #        platforms: linux/amd64,linux/arm64
          #   2. Den QEMU-Setup-Step wieder VOR dem "Login to GHCR"-Step einfuegen
          #      (registriert die binfmt-Handler fuer die Emulation):
          #        - name: Set up QEMU (Multi-Platform)
          #          uses: docker/setup-qemu-action@v4
          # Alternative ohne QEMU-Emulation (schneller): arm64 nativ auf einem
          # ARM-Runner (runs-on: ubuntu-24.04-arm) bauen und per
          # `docker buildx imagetools create` zur Multi-Arch-Manifest-Liste mergen.
          # Volle Begruendung: documentation/edge-build-platforms.md
          platforms: linux/amd64
          push: true
          # App-Version ins Image injizieren — /health meldet damit den Image-Tag
          build-args: |
            PANARY_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/panary-edge:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/panary-edge:latest
          cache-from: type=gha
          # cache-to fehlte → der gha-Cache wurde nie geschrieben, cache-from lief
          # permanent ins Leere. mode=max cached auch die teuren Zwischen-Layer
          # (better-sqlite3 unter QEMU-arm64 + die drei Angular-Production-Builds).
          cache-to: type=gha,mode=max

      # --- Supply-Chain-Herkunft des OFFIZIELLEN Edge-Images ---
      # Wichtig (Scope-Ehrlichkeit): cosign/SLSA beweisen die HERKUNFT des Images
      # und werden vom Image-Puller (Docker-Host/Admission-Controller) verifiziert.
      # Sie sind KEIN Laufzeit-Connect-Gate gegen Forks (ein selbst-gebautes Image
      # laeuft ohne diese Attestation weiter). Nutzen: nachweisbare Echtheit +
      # Detektion; das kryptografische Geraete-Gate ist Stufe 2 (Imaging-Pipeline).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, OIDC/Fulcio/Rekor)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/panary-edge
          DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/panary-edge
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
