name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      # --- Nx Self-Hosted Remote Cache (P6, 2026-06-18) ---
      # Aktiviert sich automatisch, sobald die Repo-Secrets gesetzt sind; vorher
      # leer → Nx ignoriert den Remote-Cache (No-op, kein CI-Bruch). Server-Deploy
      # + Runbook: documentation/nx-remote-cache.md
      #
      # Poisoning-Schutz (CVE-2025-36852/CREEP): nur vertrauenswuerdige main-Pushes
      # bekommen den Read-Write-Token (befuellen den Cache). PRs bekommen hoechstens
      # den Read-Only-Token; ohne RO-Token bleibt der Server fuer PRs ungesetzt →
      # reiner lokaler Cache, kein Remote-Schreibzugriff aus einem PR.
      # (secrets.X != '' im env-Wert ist erlaubt — gleiches Muster wie HAS_NX_CLOUD.)
      NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ (github.event_name == 'push' || secrets.NX_CACHE_RO_TOKEN != '') && secrets.NX_CACHE_SERVER_URL || '' }}
      NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ github.event_name == 'push' && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          filter: tree:0
          fetch-depth: 0

      # Cloud-Pattern: keine `version:` setzen — die Action liest die pnpm-
      # Version aus dem `packageManager`-Feld der package.json. Beide
      # gleichzeitig kollidieren mit ERR_PNPM_BAD_PM_VERSION (CI #187).
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      # Bestimmt NX_BASE/NX_HEAD robust (Push: letzter erfolgreicher Run,
      # Fallback HEAD~1; PR: merge-base). Verhindert, dass `affected` ohne Base
      # alle ~100 Projekte baut (Runner-OOM / Exit 130). Braucht fetch-depth: 0.
      - name: Derive affected SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      # `--no-frozen-lockfile`, weil das committete pnpm-lock.yaml im Workbench-
      # Setup ein Snapshot des geteilten Root-Lockfiles ist (Symlink + skip-worktree,
      # siehe panary-cloud/ci.yml). Dessen `overrides` sind die Vereinigung beider
      # Repos und matchen den Standalone-package.json-overrides hier nicht — frozen
      # würde mit ERR_PNPM_LOCKFILE_CONFIG_MISMATCH abbrechen. Konsistent zu panary-cloud.
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Standalone (ohne Workbench-Workspace) fehlen die node_modules/@panary/*-
      # Links → @nx/js:tsc (z. B. shared-backend) findet @panary/users/domain nicht.
      - name: Link @panary/* packages (Standalone-Resolution)
        run: bash tools/scripts/link-core-packages.sh

      # nx affected liest NX_BASE/NX_HEAD aus der Umgebung (nx-set-shas oben).
      - name: Lint, Test & Build (affected)
        shell: bash
        run: |
          # Remote-Cache-Resilienz: bricht der Lauf wegen eines Remote-Cache-
          # Fehlers ab (Server 5xx/unreachable/Token), wird EINMAL ohne Remote-
          # Cache wiederholt (Fallback auf lokalen Cache), statt die CI hart
          # fehlschlagen zu lassen — Runbook-Absicht "Cache ist optionaler
          # Beschleuniger" (documentation/nx-remote-cache.md). Echte Lint/Test/
          # Build-Fehler (kein Cache-Bezug) brechen weiterhin sofort ab.
          set -o pipefail
          run_affected() { pnpm nx affected -t lint,test,build; }
          log="$(mktemp)"
          if run_affected 2>&1 | tee "$log"; then
            exit 0
          fi
          if [ -n "${NX_SELF_HOSTED_REMOTE_CACHE_SERVER:-}" ] && grep -qiE 'remote cache' "$log"; then
            echo "::warning title=Nx Remote-Cache::Remote-Cache nicht nutzbar — Retry ohne Remote-Cache (Fallback auf lokalen Cache)."
            NX_SELF_HOSTED_REMOTE_CACHE_SERVER='' NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN='' run_affected
            exit $?
          fi
          exit 1
