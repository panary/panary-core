name: Publish Libraries

# Veröffentlicht alle Libraries mit Tag "publishable" (siehe nx.json release.projects)
# in GitHub Packages unter dem @panary-Scope.
#
# Trigger:
#   - Automatisch bei Tag-Push "v*" (z.B. v26.5.0) → echtes Publishing.
#     Release-Ablauf siehe documentation/library-publishing.md.
#   - Manuell via workflow_dispatch (Default Dry-Run zum sicheren Testen;
#     dry-run='false' publiziert die aktuell in den package.json stehende Version).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry-Run (kein tatsächliches Publishing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cloud-Pattern: keine `version:` setzen — die Action liest die pnpm-
      # Version aus dem `packageManager`-Feld der package.json. Beide
      # gleichzeitig kollidieren mit ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@panary'

      # `--no-frozen-lockfile`: das committete pnpm-lock.yaml ist im Workbench-Setup
      # ein Snapshot des geteilten Root-Lockfiles (Symlink + skip-worktree). Dessen
      # `overrides` sind die Vereinigung beider Repos und matchen die Standalone-
      # package.json-overrides nicht — frozen bräche mit ERR_PNPM_LOCKFILE_CONFIG_MISMATCH
      # ab. Konsistent zu ci.yml.
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Standalone (ohne Workbench-Workspace) fehlen die node_modules/@panary/*-
      # Links → @nx/js:tsc (z. B. shared-backend) findet @panary/users/domain nicht.
      # Das Skript repliziert die Workspace-Links, damit Cross-Lib-Builds auflösen.
      - name: Link @panary/* packages (Standalone-Resolution)
        run: bash tools/scripts/link-core-packages.sh

      - name: Build publishable libraries
        run: pnpm nx run-many -t build --projects="tag:publishable"

      - name: Dry-Run Publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx release publish --dry-run

      # Echtes Publishing: bei Tag-Push (v*) immer, bei manuellem Dispatch nur
      # wenn dry-run explizit auf 'false' steht.
      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'push' || inputs.dry-run == 'false' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx release publish
