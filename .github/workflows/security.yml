name: Security Scan

on:
  pull_request:
  schedule:
    - cron: '17 4 * * *' # nightly 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scanner:
    name: osv-scanner (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google/osv-scanner-action/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    # Offizielle gitleaks-Binary statt gitleaks-action@v2 — Letztere verlangt für
    # Org-Repos einen Lizenz-Key (GITLEAKS_LICENSE). Die CLI ist MIT-lizenziert
    # und kostenlos. `gitleaks dir` scannt den Arbeitsbaum (kein Git-History-Setup
    # nötig); Exit-Code 1 bei Funden lässt den Job fehlschlagen.
    container:
      # Digest-Pin (Supply-Chain) statt :latest — Updates via Renovate. Hinweis:
      # gitleaks-Regeln sind im Image gebundelt → der Pin friert sie ein, daher
      # regelmaessig bumpen. Digest aufgeloest am 2026-06-18.
      image: ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
    steps:
      - uses: actions/checkout@v6
      - name: gitleaks (filesystem scan)
        run: gitleaks dir . --redact --exit-code 1

  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      # Digest-Pin (Supply-Chain) statt :latest — Updates via Renovate. Die
      # semgrep-Regeln kommen zur Laufzeit aus den p/*-Configs (nicht aus dem
      # Image) → bleiben trotz Pin frisch. Digest aufgeloest am 2026-06-18.
      image: semgrep/semgrep@sha256:c180f0c93a17b420c0af5006214a29d3c747c5459c732b740191adf657dd0068
    steps:
      - uses: actions/checkout@v6
      - name: semgrep ci
        run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/secrets \
            --metrics=off

  alert-summary:
    name: GitHub alert inventory (job summary)
    runs-on: ubuntu-latest
    needs: [osv-scanner, gitleaks, semgrep]
    if: always()
    permissions:
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@v6
      - name: Render summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          summary=$GITHUB_STEP_SUMMARY
          echo "## Security alert inventory (live from GitHub API)" >> "$summary"
          echo "" >> "$summary"

          echo "### Code-Scanning (open)" >> "$summary"
          gh api --paginate "/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&per_page=100" \
            --jq '. | sort_by(.rule.security_severity_level // .rule.severity) | reverse
                    | .[] | "- **\(.rule.security_severity_level // .rule.severity // "?")** \(.rule.id) — `\(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)` — [#\(.number)](\(.html_url))"' \
            >> "$summary" 2>/dev/null || echo "_keine oder unzugaenglich_" >> "$summary"
          echo "" >> "$summary"

          echo "### Dependabot (open, sorted by CVSS)" >> "$summary"
          gh api --paginate "/repos/${GITHUB_REPOSITORY}/dependabot/alerts?state=open&per_page=100" \
            --jq '. | sort_by(.security_advisory.cvss.score // 0) | reverse
                    | .[] | "- **\(.security_advisory.severity)** \(.dependency.package.name) (\(.security_vulnerability.vulnerable_version_range)) → fix \(.security_vulnerability.first_patched_version.identifier // "n/a") — [#\(.number)](\(.html_url))"' \
            >> "$summary" 2>/dev/null || echo "_keine oder unzugaenglich_" >> "$summary"
