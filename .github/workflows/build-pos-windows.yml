name: Build POS (Windows)

on:
  workflow_dispatch:

# Least-privilege: Workflow liest nur Quellcode und laedt Artefakte hoch
# (upload-artifact braucht keine extra-Permissions). Kein Release-Push hier.
permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Cloud-Pattern: keine `version:` setzen — die Action liest die pnpm-
      # Version aus dem `packageManager`-Feld der package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/pos-client/src-tauri -> target

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular POS
        run: pnpm nx build pos-client --configuration=production --parallel=1

      - name: Verify Angular Build
        shell: bash
        run: |
          if [ ! -d "dist/apps/pos-client/browser" ]; then
            echo "ERROR: Angular build output not found at dist/apps/pos-client/browser"
            exit 1
          fi
          echo "Angular build OK: $(ls dist/apps/pos-client/browser/ | wc -l) files"

      - name: Build Tauri (NSIS Installer)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/pos-client
          tauriScript: pnpm tauri

      - name: Upload Installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: panary-pos-client-windows
          path: |
            apps/pos-client/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
