name: Release POS (Windows)

on:
  push:
    tags: ['pos-v*']
  workflow_dispatch:

permissions:
  contents: write
  # bitwarden/sm-action verlangt id-token: write (OIDC-Auth gegen den
  # self-hosted Vault). Ohne diese Permission lehnt GitHub den Workflow
  # vor der Job-Allokation ab → startup_failure (Run-Start ≈ Run-Ende,
  # keine Jobs, keine Logs). Beobachtet bei pos-v26.6.1.
  id-token: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3.0.0 (Node24-Runtime). Zuvor war @v2 (Node20)
      # gepinnt, weil v3 bei pos-v26.6.1 einen startup_failure verursachte
      # (Node24 auf GitHub-Runnern damals noch nicht GA). Mit der Node-24-
      # Erzwingung ab 2026-06-16 läuft node20 ohnehin nicht mehr → v3 ist der
      # einzige tragfähige Pfad. WICHTIG: exakt @v3.0.0, NICHT @v3 — bitwarden
      # pflegt für v3 (anders als v1/v2) KEIN bewegliches Major-Tag, nur die
      # konkreten Releases; @v3 schlägt mit "unable to find version v3" fehl
      # (beobachtet bei pos-v26.7.9).
      - name: Bitwarden Secrets laden
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3.0.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://tresor.ratke.info
          secrets: |
            dd793c0b-6aa8-4b66-98e8-b41a0188f86b > TAURI_SIGNING_PRIVATE_KEY
            ba98581b-4221-40ac-907c-b41a0189001d > TAURI_SIGNING_PRIVATE_KEY_PASSWORD

      # Cloud-Pattern: keine `version:` setzen — die Action liest die
      # autoritative pnpm-Version aus dem `packageManager`-Feld der
      # package.json. Beide gleichzeitig kollidieren mit ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/pos-client/src-tauri -> target

      # CI-Build-Kontext-Vorbereitung (Windows-PowerShell):
      # 1. pnpm-workspace.yaml liegt nur im Workbench-Root, NICHT im Repo
      #    → on-the-fly schreiben.
      # 2. pnpm-lock.yaml ist ein Symlink ins Workbench-Root → bricht in CI.
      #    Loeschen + mit --lockfile-only neu materialisieren.
      - name: Workspace-Files fuer CI-Kontext materialisieren
        shell: pwsh
        run: |
          if (Test-Path pnpm-lock.yaml) { Remove-Item -Force pnpm-lock.yaml }
          @"
          packages:
            - 'apps/*'
            - 'libs/domains/*'
            # libs/shared selbst ist das @panary/shared-Parent-Paket (Option A);
            # ohne diesen Eintrag ist es kein Workspace-Member und pnpm versucht,
            # @panary/shared (Peer der Domain-Parents, vom pos-client genutzt)
            # aus der Registry zu fetchen → FETCH_401 (so bei pos-v26.7.9).
            # Analog zu build-edge-docker.yml.
            - 'libs/shared'
            - 'libs/shared/*'
          onlyBuiltDependencies:
            - '@swc/core'
            - 'better-sqlite3'
            - 'esbuild'
            - 'nx'
          "@ | Out-File -Encoding utf8 pnpm-workspace.yaml
          # .npmrc fuer Workspace-Linking — sonst zieht pnpm @panary/*
          # aus npm.pkg.github.com (ERR_PNPM_FETCH_401 ohne Auth-Token).
          @"
          link-workspace-packages=deep
          prefer-workspace-packages=true
          auto-install-peers=true
          strict-peer-dependencies=false
          "@ | Out-File -Encoding utf8 .npmrc
          pnpm install --lockfile-only

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Standalone-Resolution der @panary/*-Pakete (siehe build-pos-windows.yml):
      # node_modules/@panary/*-Symlinks zu den lokalen libs, sonst TS2307 beim
      # `nx build pos-client`. Native Windows-Symlinks via MSYS erzwingen.
      - name: Link @panary/* packages
        shell: bash
        env:
          MSYS: winsymlinks:nativestrict
        run: bash tools/scripts/link-core-packages.sh

      - name: Build Angular POS
        run: pnpm nx build pos-client --configuration=production --parallel=1

      - name: Verify Angular Build
        shell: bash
        run: |
          if [ ! -d "dist/apps/pos-client/browser" ]; then
            echo "ERROR: Angular build output not found at dist/apps/pos-client/browser"
            exit 1
          fi
          echo "Angular build OK: $(ls dist/apps/pos-client/browser/ | wc -l) files"

      - name: Build Tauri & Create Release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/pos-client
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Panary POS ${{ github.ref_name }}'
          releaseBody: 'Neues Release der Panary POS App. Siehe Changelog für Details.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # tauri-action (gepinnte v0) laedt das Updater-Manifest bei Tauri-v2-NSIS
      # NICHT hoch ("Signature not found for the updater JSON. Skipping upload...")
      # — obwohl die .sig erzeugt und angehaengt wird. Ohne latest.json laeuft der
      # Client-Update-Check (releases/latest/download/latest.json) in einen 404,
      # der still im UpdateService-catch verschluckt wird → kein Auto-Update.
      # Deshalb das Manifest hier deterministisch selbst bauen und anhaengen.
      # Asset-Name wird aus dem tatsaechlich hochgeladenen Release-Asset gelesen
      # (GitHub normalisiert Leerzeichen/Em-Dash zu Punkten — nicht rekonstruierbar).
      - name: Updater-Manifest (latest.json) erzeugen und anhaengen
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#pos-v}"

          shopt -s nullglob
          sigs=(apps/pos-client/src-tauri/target/release/bundle/nsis/*-setup.exe.sig)
          SIG_PATH="${sigs[0]:-}"
          [ -n "$SIG_PATH" ] || { echo "ERROR: keine NSIS-.sig im Bundle gefunden"; exit 1; }

          ASSET=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets --jq '.assets[] | select(.name | endswith("-setup.exe")) | .name' | head -1)
          [ -n "$ASSET" ] || { echo "ERROR: kein -setup.exe-Asset am Release"; exit 1; }
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET}"
          PUBDATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n --rawfile sig "$SIG_PATH" --arg ver "$VERSION" --arg url "$URL" --arg date "$PUBDATE" \
            '{version:$ver, notes:"Panary POS Update", pub_date:$date, platforms:{"windows-x86_64":{signature:$sig, url:$url}}}' \
            > latest.json
          echo "--- latest.json ---"; cat latest.json
          gh release upload "$TAG" latest.json --repo "$GITHUB_REPOSITORY" --clobber
