name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # `--no-frozen-lockfile`, weil das committete pnpm-lock.yaml im Workbench-
      # Setup ein Snapshot des geteilten Root-Lockfiles ist (Symlink + skip-worktree,
      # siehe panary-cloud/ci.yml). Dessen `overrides` sind die Vereinigung beider
      # Repos und matchen den Standalone-package.json-overrides hier nicht — frozen
      # würde mit ERR_PNPM_LOCKFILE_CONFIG_MISMATCH abbrechen. Konsistent zu panary-cloud.
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint & Test (PR)
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t lint,test,build --base=origin/${{ github.base_ref }} --head=HEAD

      - name: Lint & Test (Push to main)
        if: github.event_name == 'push'
        run: pnpm nx affected -t lint,test,build
