name: Release POS (Windows)

on:
  push:
    tags: ['pos-v*']
  workflow_dispatch:

permissions:
  contents: write
  # bitwarden/sm-action verlangt id-token: write (OIDC-Auth gegen den
  # self-hosted Vault). Ohne diese Permission lehnt GitHub den Workflow
  # vor der Job-Allokation ab → startup_failure (Run-Start ≈ Run-Ende,
  # keine Jobs, keine Logs). Beobachtet bei pos-v26.6.1.
  id-token: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # bitwarden/sm-action@v3 (Node24-Runtime). Zuvor war @v2 (Node20) gepinnt,
      # weil @v3 bei pos-v26.6.1 einen startup_failure verursachte (Node24 auf
      # GitHub-Runnern damals noch nicht GA → Run-Start ≈ Run-Ende, keine Jobs,
      # keine Logs). Mit der Node-24-Erzwingung ab 2026-06-16 läuft die node20-
      # Runtime ohnehin nicht mehr → @v3 ist der einzige tragfähige Pfad.
      - name: Bitwarden Secrets laden
        uses: bitwarden/sm-action@v3
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://tresor.ratke.info
          secrets: |
            dd793c0b-6aa8-4b66-98e8-b41a0188f86b > TAURI_SIGNING_PRIVATE_KEY
            ba98581b-4221-40ac-907c-b41a0189001d > TAURI_SIGNING_PRIVATE_KEY_PASSWORD

      # Cloud-Pattern: keine `version:` setzen — die Action liest die
      # autoritative pnpm-Version aus dem `packageManager`-Feld der
      # package.json. Beide gleichzeitig kollidieren mit ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/pos-client/src-tauri -> target

      # CI-Build-Kontext-Vorbereitung (Windows-PowerShell):
      # 1. pnpm-workspace.yaml liegt nur im Workbench-Root, NICHT im Repo
      #    → on-the-fly schreiben.
      # 2. pnpm-lock.yaml ist ein Symlink ins Workbench-Root → bricht in CI.
      #    Loeschen + mit --lockfile-only neu materialisieren.
      - name: Workspace-Files fuer CI-Kontext materialisieren
        shell: pwsh
        run: |
          if (Test-Path pnpm-lock.yaml) { Remove-Item -Force pnpm-lock.yaml }
          @"
          packages:
            - 'apps/*'
            - 'libs/domains/*'
            - 'libs/shared/*'
          onlyBuiltDependencies:
            - '@swc/core'
            - 'better-sqlite3'
            - 'esbuild'
            - 'nx'
          "@ | Out-File -Encoding utf8 pnpm-workspace.yaml
          # .npmrc fuer Workspace-Linking — sonst zieht pnpm @panary/*
          # aus npm.pkg.github.com (ERR_PNPM_FETCH_401 ohne Auth-Token).
          @"
          link-workspace-packages=deep
          prefer-workspace-packages=true
          auto-install-peers=true
          strict-peer-dependencies=false
          "@ | Out-File -Encoding utf8 .npmrc
          pnpm install --lockfile-only

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Angular POS
        run: pnpm nx build pos-client --configuration=production --parallel=1

      - name: Verify Angular Build
        shell: bash
        run: |
          if [ ! -d "dist/apps/pos-client/browser" ]; then
            echo "ERROR: Angular build output not found at dist/apps/pos-client/browser"
            exit 1
          fi
          echo "Angular build OK: $(ls dist/apps/pos-client/browser/ | wc -l) files"

      - name: Build Tauri & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/pos-client
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Panary POS ${{ github.ref_name }}'
          releaseBody: 'Neues Release der Panary POS App. Siehe Changelog für Details.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
