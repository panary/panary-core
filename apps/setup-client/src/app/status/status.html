<div class="min-h-screen bg-black text-white flex flex-col items-center justify-center p-8 space-y-8">
    <div class="w-24 h-24 rounded-full bg-green-500 flex items-center justify-center animate-pulse">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            class="w-12 h-12 text-black">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
    </div>

    <div class="text-center space-y-2">
        <h1 class="text-3xl font-bold">{{ 'STATUS.ONLINE' | translate }}</h1>
        <p class="text-gray-400">{{ 'STATUS.READY' | translate }}</p>
    </div>

    <div class="bg-gray-900 rounded-lg p-6 w-full max-w-md space-y-4">
        <div class="flex justify-between border-b border-gray-800 pb-2">
            <span class="text-gray-500">{{ 'STATUS.IP' | translate }}</span>
            <span class="font-mono">{{ ipAddress() }}</span>
        </div>
        <div class="flex justify-between border-b border-gray-800 pb-2">
            <span class="text-gray-500">{{ 'STATUS.STATUS' | translate }}</span>
            <span class="text-green-500 font-bold">{{ 'STATUS.ACTIVE' | translate }}</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500">{{ 'STATUS.VERSION' | translate }}</span>
            <span>1.0.0</span>
        </div>
    </div>
</div>
