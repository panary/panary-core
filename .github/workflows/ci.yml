name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cloud-Pattern: keine `version:` setzen — die Action liest die pnpm-
      # Version aus dem `packageManager`-Feld der package.json. Beide
      # gleichzeitig kollidieren mit ERR_PNPM_BAD_PM_VERSION (CI #187).
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # Bestimmt NX_BASE/NX_HEAD robust (Push: letzter erfolgreicher Run,
      # Fallback HEAD~1; PR: merge-base). Verhindert, dass `affected` ohne Base
      # alle ~100 Projekte baut (Runner-OOM / Exit 130). Braucht fetch-depth: 0.
      - name: Derive affected SHAs
        uses: nrwl/nx-set-shas@v4

      # `--no-frozen-lockfile`, weil das committete pnpm-lock.yaml im Workbench-
      # Setup ein Snapshot des geteilten Root-Lockfiles ist (Symlink + skip-worktree,
      # siehe panary-cloud/ci.yml). Dessen `overrides` sind die Vereinigung beider
      # Repos und matchen den Standalone-package.json-overrides hier nicht — frozen
      # würde mit ERR_PNPM_LOCKFILE_CONFIG_MISMATCH abbrechen. Konsistent zu panary-cloud.
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Standalone (ohne Workbench-Workspace) fehlen die node_modules/@panary/*-
      # Links → @nx/js:tsc (z. B. shared-backend) findet @panary/users/domain nicht.
      - name: Link @panary/* packages (Standalone-Resolution)
        run: bash tools/scripts/link-core-packages.sh

      # nx affected liest NX_BASE/NX_HEAD aus der Umgebung (nx-set-shas oben).
      - name: Lint, Test & Build (affected)
        run: pnpm nx affected -t lint,test,build
