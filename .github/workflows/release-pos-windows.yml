name: Release POS (Windows)

on:
  push:
    tags: ['pos-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bitwarden Secrets laden
        uses: bitwarden/sm-action@v3
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://tresor.ratke.info
          secrets: |
            dd793c0b-6aa8-4b66-98e8-b41a0188f86b > TAURI_SIGNING_PRIVATE_KEY
            ba98581b-4221-40ac-907c-b41a0189001d > TAURI_SIGNING_PRIVATE_KEY_PASSWORD

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/pos/src-tauri -> target

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular POS
        run: pnpm nx build pos --configuration=production --parallel=1

      - name: Verify Angular Build
        shell: bash
        run: |
          if [ ! -d "dist/apps/pos/browser" ]; then
            echo "ERROR: Angular build output not found at dist/apps/pos/browser"
            exit 1
          fi
          echo "Angular build OK: $(ls dist/apps/pos/browser/ | wc -l) files"

      - name: Build Tauri & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/pos
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Panary POS ${{ github.ref_name }}'
          releaseBody: 'Neues Release der Panary POS App. Siehe Changelog für Details.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
