name: Build Edge Docker

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (Multi-Platform)
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version Tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag-Push: Version direkt aus dem Tag lesen (v26.4.1 → 26.4.1)
            echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch: Version aus package.json lesen
            echo "tag=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Copy .dockerignore
        run: cp tools/docker/.dockerignore .dockerignore

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: tools/docker/Dockerfile.edge
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/panary-edge:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/panary-edge:latest
          cache-from: type=gha
